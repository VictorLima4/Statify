kind = "web"
previewPath = "/"
title = "Spotify Analytics Dashboard"
version = "1.0.0"
id = "artifacts/spotify-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18662

[services.development]
run = "pnpm --filter @workspace/spotify-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/spotify-dashboard", "run", "build" ]
publicDir = "artifacts/spotify-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18662"
BASE_PATH = "/"
